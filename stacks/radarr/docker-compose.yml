services:
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls304
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Sofia
    volumes:
      - /opt/appdata/radarr:/config
      - /storage:/storage
    ports:
      - 7878:7878
    restart: unless-stopped
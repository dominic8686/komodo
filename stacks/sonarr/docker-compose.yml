services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls313
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Sofia
    volumes:
      - /opt/appdata/sonarr:/config
      - /storage:/storage
    ports:
      - 8989:8989
    restart: unless-stopped